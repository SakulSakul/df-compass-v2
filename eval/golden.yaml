# ============================================================
#  DF COMPASS v2 · Golden Testset (Phase 1 ⑦ — eval-first 의 자)
#  2026-07-22 구축. 카테고리 층화 52문항. 기존 16 fixtures 흡수(중복 제거).
#
#  스키마:
#    id / category / question
#    expected_sources:   검색 수준 채점용 문서 제목 substring (runner 호환)
#    expected_citations: 답변 수준 기대 인용 [{doc, article}] —
#                        article 은 **원장 실재 표기까지만** 지정.
#
#  ⚠️ 원칙 (2026-07-22 벤치 교훈):
#  - 코퍼스 다수 문서가 조(條) 구조가 아님(부칙만/무조항) → 그런 문서는
#    기대 인용도 문서 단위(article: null). "(문서명, 제N조)" 형식을 프롬프트로
#    강제하면 모델이 조번호를 지어낸다 — 합성 프롬프트 인용 지시도 동일 원칙:
#    "조항 번호가 발췌에 명시된 경우에만 (문서명, 제N조), 아니면 문서명만".
#  - 파생 원장의 제N조 다수가 문서가 인용한 **법조문**(산안법 제79조 등)임 —
#    article 지정은 그 표기가 문서 본문에 실재함을 뜻할 뿐, "사규 자체 조항"
#    보장이 아님 (표기 수준 원칙).
#  - 기대 인용 실재성은 tools/validate_golden.py 가 파생 원장으로 자동 검증.
#
#  negative 판정 기준 (설계):
#  - 검색 수준: hit 0건이면 pass (기존 규칙 유지). 단 v4 RPC 는 항상 top-k 를
#    반환하므로 검색 수준 negative 는 참고 지표.
#  - 답변 수준(정본): 답변이 무응답 표명(“확인 필요/사규에 없” 류) AND
#    검증 인용 ok=0 AND 위조 인용 0 이면 pass. (score CLI 가 구현)
# ============================================================

